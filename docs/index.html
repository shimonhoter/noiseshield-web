<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoiseShield — הצטרף לשיחה</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0c0f;
    color: #e8edf5;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #111418;
    border: 1px solid #1e2430;
    border-radius: 16px;
    padding: 32px 24px;
    width: 100%;
    max-width: 400px;
    text-align: center;
  }
  h1 { color: #00e5a0; font-size: 28px; margin-bottom: 8px; }
  .subtitle { color: #5a6480; font-size: 14px; margin-bottom: 32px; }
  .status {
    background: #0a1a0a;
    border: 1px solid #1e3a1e;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    color: #00e5a0;
    font-size: 14px;
  }
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .btn-primary { background: #00e5a0; color: #0a0c0f; }
  .btn-danger { background: #ff4060; color: white; display: none; }
  .wave {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin: 20px 0;
    height: 40px;
    align-items: center;
  }
  .bar {
    width: 4px;
    background: #00e5a0;
    border-radius: 2px;
    animation: wave 1s ease-in-out infinite;
  }
  .bar:nth-child(2) { animation-delay: 0.1s; }
  .bar:nth-child(3) { animation-delay: 0.2s; }
  .bar:nth-child(4) { animation-delay: 0.3s; }
  .bar:nth-child(5) { animation-delay: 0.4s; }
  @keyframes wave {
    0%, 100% { height: 8px; }
    50% { height: 32px; }
  }
  .wave { display: none; }
  .wave.active { display: flex; }
</style>
</head>
<body>
<div class="card">
  <h1>NoiseShield</h1>
  <p class="subtitle">שיחה עם סינון רעשי רקע</p>

  <div class="status" id="status">ממתין לחיבור...</div>

  <div class="wave" id="wave">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>

  <button class="btn btn-primary" id="btnJoin" onclick="joinCall()">
    🎙 הצטרף לשיחה
  </button>
  <button class="btn btn-danger" id="btnHangup" onclick="hangup()">
    📵 סיים שיחה
  </button>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const peerId = urlParams.get('room');

  let peer, conn, localStream;

  async function joinCall() {
    document.getElementById('status').textContent = 'מתחבר...';
    document.getElementById('btnJoin').disabled = true;

    try {
      localStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        },
        video: false
      });

      peer = new Peer();

      peer.on('open', () => {
        if (peerId) {
          const call = peer.call(peerId, localStream);
          call.on('stream', remoteStream => {
            playStream(remoteStream);
            document.getElementById('status').textContent = '🟢 שיחה פעילה';
            document.getElementById('wave').classList.add('active');
            document.getElementById('btnHangup').style.display = 'block';
          });
        }
      });

      peer.on('error', err => {
        document.getElementById('status').textContent = 'שגיאה: ' + err.message;
        document.getElementById('btnJoin').disabled = false;
      });

    } catch(e) {
      document.getElementById('status').textContent = 'שגיאה: ' + e.message;
      document.getElementById('btnJoin').disabled = false;
    }
  }

  function playStream(stream) {
    const audio = new Audio();
    audio.srcObject = stream;
    audio.autoplay = true;
    document.body.appendChild(audio);
  }

  function hangup() {
    if (peer) peer.destroy();
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    document.getElementById('status').textContent = 'השיחה הסתיימה';
    document.getElementById('wave').classList.remove('active');
    document.getElementById('btnHangup').style.display = 'none';
    document.getElementById('btnJoin').disabled = false;
  }

  if (!peerId) {
    document.getElementById('status').textContent = 'קישור לא תקין';
    document.getElementById('btnJoin').disabled = true;
  }
</script>
</body>
</html>
